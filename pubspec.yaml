publish_to: 'none'
version: 1.0.0+1

environment:
     sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  provider: ^6.1.1

publish_to: 'none'
version: 1.0.0+1

environment:
     sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  provider: ^6.1.5+1
  intl: ^0.20.2
